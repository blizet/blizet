<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200" role="img" aria-label="Like the vibe? Say hi.">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&amp;display=swap');
      .headline {
        font-family: 'Permanent Marker', 'Caveat', 'Comic Sans MS', cursive;
        font-size: 72px;
        fill: #2d1a06;
        letter-spacing: 1px;
      }
    </style>
    <!-- subtle grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- background  same desk sand -->
  <rect width="900" height="200" fill="#f5e8bc"/>
  <!-- very subtle paper grain overlay -->
  <rect width="900" height="200" fill="#c8a060" opacity="0.06" filter="url(#grain)"/>

  <!-- main headline -->
  <text
    x="450"
    y="118"
    text-anchor="middle"
    class="headline"
    font-family="'Permanent Marker', 'Caveat', 'Comic Sans MS', cursive"
    font-size="72"
    font-weight="400"
    fill="#2d1a06"
    letter-spacing="1"
  >LIKE THE VIBE? SAY HI.</text>

  <!-- thick underline  matches stroke weight in the reference -->
  <line x1="148" y1="140" x2="752" y2="140" stroke="#2d1a06" stroke-width="3.5" stroke-linecap="round"/>

  <!-- subtle sub-line with email -->
  <text
    x="450"
    y="172"
    text-anchor="middle"
    font-family="system-ui, 'Segoe UI', sans-serif"
    font-size="14"
    fill="#78503a"
    letter-spacing="3"
    opacity="0.75"
  >anjalijha2k3@gmail.com · anjalijha.info</text>
</svg>

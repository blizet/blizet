<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Desk</title>
    <style>
      :root {
        --bg: #fff7ed;
        --ink: #5b4b6a;
        --muted: #8b7b99;
        --btn: #a855f7;
        --btn2: #c084fc;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, "Segoe UI", sans-serif;
        background: linear-gradient(160deg, #ffe4e6, #e0e7ff 45%, #d1fae5);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 26rem;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(168, 85, 247, 0.2);
        border-radius: 1.25rem;
        padding: 1.5rem 1.35rem;
        box-shadow: 0 12px 40px rgba(91, 33, 182, 0.08);
        text-align: center;
        line-height: 1.55;
      }
      h1 {
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0.5rem 0;
        color: var(--muted);
        font-size: 0.95rem;
      }
      code {
        font-size: 0.8rem;
        background: #fdf4ff;
        padding: 0.1rem 0.35rem;
        border-radius: 0.35rem;
        color: #6b21b6;
      }
      a#go {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.75rem 1.35rem;
        border-radius: 999px;
        background: linear-gradient(120deg, var(--btn), var(--btn2));
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        box-shadow: 0 4px 16px rgba(168, 85, 247, 0.35);
      }
      a#go:hover {
        filter: brightness(1.05);
      }
      a.sub {
        display: inline-block;
        margin-top: 0.75rem;
        color: #7c3aed;
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Interactive desk</h1>
      <p>
        Set <code>DESK_URL</code> in this file to your deployed Next app, then turn on
        <strong>GitHub Pages</strong> (branch <code>main</code>, folder <code>/docs</code>). The README image can link here, and this button sends people to your live desk.
      </p>
      <a id="go" href="https://github.com/blizet/blizet/tree/main">Open repository</a>
      <a class="sub" id="src" href="https://github.com/blizet/blizet/tree/main/components">Desk source</a>
    </div>
    <script>
      (function () {
        /** Paste your deployed site URL here (Vercel, Netlify, custom domain). */
        var DESK_URL = "";

        var go = document.getElementById("go");
        if (DESK_URL && go) {
          go.href = DESK_URL;
          go.textContent = "Open the live desk";
        }
      })();
    </script>
  </body>
</html>
